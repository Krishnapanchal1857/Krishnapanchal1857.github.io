<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sign Up — SAKSHAR</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Hind:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--sf:#FF6B00;--sf2:#FF8C35;--sfp:#FFF3EB;--nv:#0B1F3A;--nvm:#162E52;--cr:#FDFAF5;--g1:#F5F5F5;--g2:#E8E8E8;--g4:#9A9A9A;--g6:#555;--green:#059669}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hind',sans-serif;background:var(--nv);min-height:100vh}
.navbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(11,31,58,.97);backdrop-filter:blur(14px);height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;border-bottom:2.5px solid var(--sf)}
.nav-logo{font-family:'Baloo 2',cursive;font-size:1.75rem;font-weight:800;color:#fff;letter-spacing:2px;text-decoration:none}.nav-logo span{color:var(--sf)}
.nav-links{display:flex;gap:4px;align-items:center}
.auth-page{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:88px 20px 48px;position:relative;overflow:hidden}
.auth-page::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 40%,rgba(255,107,0,.13) 0%,transparent 50%)}
.auth-box{background:#fff;border-radius:20px;width:100%;max-width:680px;box-shadow:0 24px 80px rgba(0,0,0,.32);overflow:hidden;position:relative;z-index:2}
.auth-header{background:var(--nvm);padding:32px 40px 24px;text-align:center}
.auth-logo{font-family:'Baloo 2',cursive;font-size:2rem;font-weight:800;color:#fff;letter-spacing:2px}.auth-logo span{color:var(--sf)}
.auth-title{font-family:'Baloo 2',cursive;font-size:1.5rem;font-weight:700;color:#fff;margin-top:14px}
.auth-subtitle{color:rgba(255,255,255,.5);font-size:.87rem;margin-top:5px}
.auth-body{padding:32px 40px 40px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:.77rem;font-weight:700;color:var(--g6);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-input,.form-select{width:100%;border:1.5px solid var(--g2);border-radius:10px;padding:12px 14px;font-family:'Hind',sans-serif;font-size:.92rem;color:var(--nv);outline:none;transition:border-color .18s;background:#fff}
.form-input:focus,.form-select:focus{border-color:var(--sf)}
.form-error{background:#FFF1F0;border-radius:9px;padding:10px 14px;font-size:.83rem;color:#DC2626;border:1.5px solid #FEE2E2;margin-bottom:14px;display:none}
.form-success{background:#EDFAF2;border-radius:9px;padding:10px 14px;font-size:.83rem;color:var(--green);border:1.5px solid #BBF7D0;margin-bottom:14px;display:none}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 22px;border-radius:10px;font-family:'Hind',sans-serif;font-weight:700;font-size:.92rem;cursor:pointer;border:none;transition:all .2s}
.btn-sf{background:var(--sf);color:#fff}.btn-sf:hover{background:var(--sf2)}
.btn-out{background:#fff;color:var(--nv);border:2px solid var(--g2)}.btn-out:hover{border-color:var(--sf);color:var(--sf)}
.btn-full{width:100%}
.progress-steps{display:flex;gap:0;margin-bottom:28px;border-radius:10px;overflow:hidden}
.step{flex:1;padding:10px 6px;text-align:center;font-size:.75rem;font-weight:600;background:var(--g1);color:var(--g4);border-right:2px solid #fff}.step:last-child{border-right:none}
.step.active{background:var(--sf);color:#fff}.step.done{background:var(--green);color:#fff}
.form-page{display:none}.form-page.active{display:block}
.upload-zone{border:2px dashed var(--g2);border-radius:12px;padding:24px;text-align:center;cursor:pointer;background:var(--cr);position:relative;transition:all .2s}
.upload-zone:hover{border-color:var(--sf);background:var(--sfp)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
@media(max-width:600px){.form-row{grid-template-columns:1fr}.auth-body{padding:24px 20px}}
</style>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="nav-logo">SAK<span>SHAR</span></a>
  <div id="main-nav-links" class="nav-links"></div>
</nav>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-header">
      <div class="auth-logo">SAK<span>SHAR</span></div>
      <div class="auth-title">Create Your Account 🎓</div>
      <div class="auth-subtitle">Complete your profile to unlock all resources</div>
    </div>
    <div class="auth-body">
      <div class="progress-steps">
        <div class="step active" id="step1-ind">1. Personal Info</div>
        <div class="step" id="step2-ind">2. Academic Info</div>
        <div class="step" id="step3-ind">3. ID & Verify</div>
      </div>
      <div class="form-error" id="signup-error"></div>
      <div class="form-success" id="signup-success"></div>
      <!-- Page 1 -->
      <div class="form-page active" id="form-page-1">
        <div class="form-row">
          <div class="form-group"><label class="form-label">First Name *</label><input type="text" class="form-input" id="fname" placeholder="Rahul"></div>
          <div class="form-group"><label class="form-label">Last Name *</label><input type="text" class="form-input" id="lname" placeholder="Sharma"></div>
        </div>
        <div class="form-group"><label class="form-label">Email Address *</label><input type="email" class="form-input" id="email" placeholder="rahul@email.com"></div>
        <div class="form-group"><label class="form-label">Mobile Number *</label><input type="tel" class="form-input" id="mobile" placeholder="+91 98765 43210" maxlength="13"></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Password * (min 6 chars)</label><input type="password" class="form-input" id="pass" placeholder="••••••••"></div>
          <div class="form-group"><label class="form-label">Confirm Password *</label><input type="password" class="form-input" id="pass2" placeholder="••••••••"></div>
        </div>
        <button class="btn btn-sf btn-full" onclick="goStep(2)">Next: Academic Info →</button>
      </div>
      <!-- Page 2 -->
      <div class="form-page" id="form-page-2">
        <div class="form-group">
          <label class="form-label">Department / Stream *</label>
          <select class="form-select" id="dept">
            <option value="">-- Select Your Department --</option>
            <option value="12sci">12th Science (PCM / PCB / PCMB)</option>
            <option value="12com">12th Commerce</option>
            <option value="12arts">12th Arts / HSC</option>
            <option value="bscit">BSc IT / BCA / MCA</option>
            <option value="bcom">B.Com / M.Com</option>
            <option value="ba">BA (Arts)</option>
            <option value="btech_cse">B.Tech / B.E — CSE / IT / AI / DS</option>
            <option value="btech_mech">B.Tech / B.E — Mechanical Engineering</option>
            <option value="btech_civil">B.Tech / B.E — Civil Engineering</option>
            <option value="pharma">Pharmacy (D.Pharm / B.Pharm)</option>
            <option value="nursing">Nursing / GNM / ANM</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Current Year / Semester *</label>
            <select class="form-select" id="year">
              <option value="">Select</option>
              <option>11th Grade</option><option>12th Grade</option>
              <option>1st Year / Sem 1-2</option><option>2nd Year / Sem 3-4</option>
              <option>3rd Year / Sem 5-6</option><option>4th Year / Sem 7-8</option>
            </select>
          </div>
          <div class="form-group"><label class="form-label">State *</label><select class="form-select" id="state"><option value="">Select State</option></select></div>
        </div>
        <div class="form-group"><label class="form-label">School / College Name *</label><input type="text" class="form-input" id="college" placeholder="e.g., SPPU College of Engineering, Pune"></div>
        <div class="form-group"><label class="form-label">College / School UID / Roll Number *</label><input type="text" class="form-input" id="uid" placeholder="e.g., MH22CS001"></div>
        <div class="form-group"><label class="form-label">City / Town</label><input type="text" class="form-input" id="city" placeholder="e.g., Pune, Nagpur, Mumbai"></div>
        <div style="display:flex;gap:12px">
          <button class="btn btn-out" onclick="goStep(1)" style="flex:1">← Back</button>
          <button class="btn btn-sf" onclick="goStep(3)" style="flex:2">Next: ID Verification →</button>
        </div>
      </div>
      <!-- Page 3 -->
      <div class="form-page" id="form-page-3">
        <div class="form-group">
          <label class="form-label">Upload ID Card Photo *</label>
          <div class="upload-zone" onclick="document.getElementById('id-file').click()">
            <div style="font-size:2rem;margin-bottom:8px">🪪</div>
            <div style="font-weight:700;font-size:.88rem;color:var(--nv)">Click to upload your student ID card</div>
            <div style="font-size:.78rem;color:var(--g4);margin-top:4px">JPG, PNG, PDF — Max 2MB</div>
            <div id="id-preview" style="display:none;margin-top:12px"><img id="id-img" src="" style="max-width:200px;border-radius:8px;border:2px solid var(--sf)"></div>
            <input type="file" id="id-file" accept="image/*,application/pdf" style="display:none" onchange="previewID(this)">
          </div>
          <div style="font-size:.78rem;color:var(--g4);margin-top:6px">Your ID is securely stored and only visible to SAKSHAR admins.</div>
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:.85rem;color:var(--g6)">
            <input type="checkbox" id="agree" style="margin-top:2px;accent-color:var(--sf)">
            I agree to SAKSHAR's terms. My data will only be used for academic purposes.
          </label>
        </div>
        <div style="display:flex;gap:12px">
          <button class="btn btn-out" onclick="goStep(2)" style="flex:1">← Back</button>
          <button class="btn btn-sf" onclick="doSignup()" style="flex:2">🎓 Create My Account</button>
        </div>
        <div style="text-align:center;margin-top:16px;font-size:.88rem;color:var(--g6)">Already a member? <a href="login.html" style="color:var(--sf);font-weight:600">Login here</a></div>
      </div>
    </div>
  </div>
</div>
<script>
var INDIAN_STATES=['Andhra Pradesh','Arunachal Pradesh','Assam','Bihar','Chhattisgarh','Goa','Gujarat','Haryana','Himachal Pradesh','Jharkhand','Karnataka','Kerala','Madhya Pradesh','Maharashtra','Manipur','Meghalaya','Mizoram','Nagaland','Odisha','Punjab','Rajasthan','Sikkim','Tamil Nadu','Telangana','Tripura','Uttar Pradesh','Uttarakhand','West Bengal','Delhi','Jammu & Kashmir','Ladakh','Puducherry','Chandigarh','Other'];
function getUsers(){try{return JSON.parse(localStorage.getItem('sakshar_users')||'[]')}catch{return[]}}
function saveUsers(u){localStorage.setItem('sakshar_users',JSON.stringify(u))}
function setCurrentUser(u){localStorage.setItem('sakshar_current',JSON.stringify(u))}
function getCurrentUser(){try{return JSON.parse(localStorage.getItem('sakshar_current')||'null')}catch{return null}}
function renderNav(){
  var el=document.getElementById('main-nav-links');if(!el)return;
  var nb='background:none;border:none;color:rgba(255,255,255,.72);font-family:Hind,sans-serif;font-size:.84rem;font-weight:500;padding:7px 12px;cursor:pointer;border-radius:7px;text-decoration:none';
  el.innerHTML='<a href="index.html" style="'+nb+'">Home</a><a href="login.html" style="'+nb+'">Login</a><a href="signup.html" style="background:#FF6B00;color:#fff;font-family:Hind,sans-serif;font-size:.84rem;font-weight:700;padding:7px 14px;border-radius:7px;text-decoration:none">Join Free</a>';
}
// Populate states
var stateEl=document.getElementById('state');
INDIAN_STATES.forEach(function(s){var o=document.createElement('option');o.value=s;o.textContent=s;stateEl.appendChild(o);});
var idBase64='';
function previewID(input){
  var file=input.files[0];if(!file)return;
  if(file.size>2*1024*1024){alert('File too large! Max 2MB');return;}
  var reader=new FileReader();
  reader.onload=function(e){idBase64=e.target.result;if(file.type.startsWith('image/')){document.getElementById('id-img').src=e.target.result;document.getElementById('id-preview').style.display='block';}};
  reader.readAsDataURL(file);
}
function goStep(n){
  var err=document.getElementById('signup-error');err.style.display='none';
  if(n===2){
    var fname=document.getElementById('fname').value.trim(),lname=document.getElementById('lname').value.trim(),email=document.getElementById('email').value.trim(),mobile=document.getElementById('mobile').value.trim(),pass=document.getElementById('pass').value,pass2=document.getElementById('pass2').value;
    if(!fname||!lname||!email||!mobile||!pass){err.textContent='Please fill all required fields.';err.style.display='block';return;}
    if(pass.length<6){err.textContent='Password must be at least 6 characters.';err.style.display='block';return;}
    if(pass!==pass2){err.textContent='Passwords do not match.';err.style.display='block';return;}
    var users=getUsers();if(users.find(function(u){return u.email===email;})){err.textContent='Account with this email already exists.';err.style.display='block';return;}
  }
  if(n===3){
    var dept=document.getElementById('dept').value,year=document.getElementById('year').value,state=document.getElementById('state').value,college=document.getElementById('college').value.trim(),uid=document.getElementById('uid').value.trim();
    if(!dept||!year||!state||!college||!uid){err.textContent='Please fill all academic details.';err.style.display='block';return;}
  }
  [1,2,3].forEach(function(i){
    document.getElementById('form-page-'+i).classList.remove('active');
    var ind=document.getElementById('step'+i+'-ind');ind.classList.remove('active','done');
    if(i<n)ind.classList.add('done');else if(i===n)ind.classList.add('active');
  });
  document.getElementById('form-page-'+n).classList.add('active');
}
function doSignup(){
  var err=document.getElementById('signup-error');var suc=document.getElementById('signup-success');
  err.style.display='none';suc.style.display='none';
  if(!document.getElementById('agree').checked){err.textContent='Please agree to the terms to continue.';err.style.display='block';return;}
  var user={fname:document.getElementById('fname').value.trim(),lname:document.getElementById('lname').value.trim(),email:document.getElementById('email').value.trim(),mobile:document.getElementById('mobile').value.trim(),password:document.getElementById('pass').value,dept:document.getElementById('dept').value,year:document.getElementById('year').value,state:document.getElementById('state').value,city:document.getElementById('city').value.trim(),college:document.getElementById('college').value.trim(),uid:document.getElementById('uid').value.trim(),idCard:idBase64||'(Not uploaded)',emailVerified:false,joinDate:new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}),joinTimestamp:Date.now()};
  var users=getUsers();users.push(user);saveUsers(users);setCurrentUser(user);
  suc.textContent='🎉 Account created! Redirecting to your dashboard...';suc.style.display='block';
  setTimeout(function(){window.location.href='dashboard.html';},1300);
}
renderNav();
</script>
</body>
</html>
